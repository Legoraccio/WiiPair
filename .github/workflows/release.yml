name: Release

# Triggered only by pushing a vX.Y.Z tag. Each tag produces a draft
# GitHub Release with a Windows zip and a Linux tar.gz attached; the
# release is left as a draft so a human can sanity-check the artifacts
# before publishing.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # pre-releases like v0.1.0-rc1

permissions:
  contents: write   # needed to create the GitHub Release

# Opt every JavaScript-based action into Node 24 ahead of the default
# switchover (June 2026). Avoids the "Node.js 20 actions are deprecated"
# warning without having to wait for each third-party action to ship
# a v5 / Node 24 release of its own.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------
  # Sanity check: the tag version must match the workspace version in
  # Cargo.toml so we never publish a release with a misleading number.
  # ---------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VER=$(awk -F'"' '
            /^\[workspace\.package\]/ {f=1; next}
            /^\[/ {f=0}
            f && /^version[[:space:]]*=/ {print $2; exit}
          ' Cargo.toml)
          if [ -z "$MANIFEST_VER" ]; then
            echo "::error::Could not read [workspace.package].version from Cargo.toml"
            exit 1
          fi
          if [ "$TAG_VER" != "$MANIFEST_VER" ]; then
            echo "::error::Tag v$TAG_VER doesn't match Cargo.toml version $MANIFEST_VER"
            exit 1
          fi
          echo "version=$TAG_VER" >> "$GITHUB_OUTPUT"
          echo "Building release for v$TAG_VER"

  # ---------------------------------------------------------------------
  # Linux build: dynamic-linked against Ubuntu 22.04 system libs (glibc
  # 2.35). Works on Ubuntu 22.04+, Debian 12+, Mint 21+, Bluefin /
  # Silverblue F38+, and any distro with libdbus-1.3 + libudev1 +
  # libxkbcommon recent enough to match what egui pulls in.
  # ---------------------------------------------------------------------
  build-linux:
    needs: validate
    runs-on: ubuntu-22.04
    env:
      # mold cuts ~1-2 minutes off the link phase of a cold release
      # build. Clang drives the link so the -fuse-ld=mold flag is
      # forwarded properly through rustc.
      RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libudev-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libgl1-mesa-dev \
            libssl-dev \
            clang \
            mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-linux

      - name: Build release
        run: cargo build --profile release-dist --locked -p wiipair-ui

      - name: Stage artifact
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate.outputs.version }}"
          STAGE="wiipair-${VERSION}-x86_64-linux"
          mkdir -p "$STAGE"
          cp target/release-dist/wiipair "$STAGE/"
          cp README.md LICENSE "$STAGE/"
          mkdir -p "$STAGE/docs/udev"
          cp docs/udev/99-wiipair.rules "$STAGE/docs/udev/"
          # Desktop integration: ship the icon source PNG and the
          # .desktop file so users can wire WiiPair into their app
          # menu. Installation is documented in the README.
          if [ -f assets/icon.png ]; then
            mkdir -p "$STAGE/docs/desktop"
            cp assets/icon.png "$STAGE/docs/desktop/wiipair.png"
            cp docs/desktop/wiipair.desktop "$STAGE/docs/desktop/"
          fi
          tar -czf "${STAGE}.tar.gz" "$STAGE"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: wiipair-*-x86_64-linux.tar.gz
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------
  # Windows build: pure-Rust toolchain, no system deps. Binary is
  # unsigned — SmartScreen will warn the first time the user runs it.
  # ---------------------------------------------------------------------
  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows

      - name: Build release
        run: cargo build --profile release-dist --locked -p wiipair-ui

      - name: Stage artifact
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          $stage = "wiipair-$version-x86_64-windows"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item target/release-dist/wiipair.exe $stage/
          Copy-Item README.md $stage/
          Copy-Item LICENSE $stage/
          Compress-Archive -Path "$stage/*" -DestinationPath "$stage.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: wiipair-*-x86_64-windows.zip
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------
  # Aggregate artifacts and publish a draft release. Body is the auto-
  # generated changelog from the previous tag — keep commit messages
  # in conventional-commit style for nicer release notes.
  # ---------------------------------------------------------------------
  release:
    needs: [validate, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the changelog can diff against the previous tag

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Build changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          PREV=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            RANGE="$PREV..${{ github.ref_name }}"
            HEADER="Changes since $PREV"
          else
            RANGE="${{ github.ref_name }}"
            HEADER="Initial release"
          fi
          {
            echo "## $HEADER"
            echo
            git log --pretty='format:* %s (%h)' "$RANGE"
          } > CHANGELOG.md
          cat CHANGELOG.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WiiPair ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: CHANGELOG.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          fail_on_unmatched_files: true
